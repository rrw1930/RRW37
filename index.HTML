<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Pong</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Simple Pong</h1>
    <div id="scoreboard">
      <div id="playerScore">Player: 0</div>
      <div id="computerScore">Computer: 0</div>
    </div>
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="controls">
      <p>Controls: Move mouse over the canvas or use Arrow Up / Arrow Down to move left paddle.</p>
      <p>Click the canvas to (re)start. Press Space to pause/resume.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
